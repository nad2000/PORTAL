<table class="table table-striped">
{% for ra in report.activities.through.objects.filter(report=report) %}
  {% set a=ra.activity %}
  <tr>
    <td>{{ a.title }}{% if a.title2 %}
        / {{ a.title2 }}
      {% endif %}
      {% if a.doi %}
        DOI: <a href="{{ a.doi }}">
          {{ a.doi }}
        </a>
      {% endif %}
    </td>
    <td>
      <div class="buttonHolder float-right">
      <button
        class="btn btn-danger btn-sm"
        type="button"
        hx-delete="{{ url('objects-delete', model=ra._meta.model_name, pk=ra.pk) }}"
        hx-params="none"
        hx-target="#messages"
        hx-swap="beforeend scroll:bottom"
        hx-on:htmx:after-request="delete_closest_table_row(this, event)"
        hx-confirm="{{ _('Do you wish to deleted the publication record "%s"?') % a.title }}"
      >
        <i class="fa fa-times" style="width: 12px;"></i>
      </button>
      <button
        class="btn btn-primary btn-sm"
        type="button"
        hx-get="{{ url('publication-update', pk=a.pk) }}?report={{ report.pk }}&_modal_dialog=1"
        hx-target="#publication-dialog"
        hx-params="none"
      ><i class='fas fa-edit' style="width: 14px;"></i>
      </button>
      </div>
    </td>
  </tr>
{% endfor %}
<tr>
  <td>&nbsp;</td>
  <td>
    <div class="buttonHolder float-right">
    <button
      type="button"
      class="btn btn-success btn-sm"
      hx-get="{{ url('publication-create') }}?report={{ report.pk }}&_modal_dialog=1"
      hx-target="#publication-dialog"
    ><i class="fa fa-plus" style="width: 14px;"></i>
    </button>
    </div>
  </td>
</tr>
</table>
