<!DOCTYPE html>
<html>
  <head>
    <style>
@page {
  /* size: 21cm 3cm;*/
  size: {{ width or 210 }}mm {{ height or 297 }}mm;
  margin: 1cm 1cm 5mm 2cm;
  font-family: Arial;
  font-size: 10pt;
}
h1 { line-height: 120%; font-size:10.0pt; text-align: center; text-transform: uppercase; orphans: 2; widows: 2; direction: ltr; background: white; page-break-after: avoid; }
div.pb {
  page-break-after: always;
  break-after: page;
}
/*header {
  font-family: Arial;
  font-size: 8pt;
}*/
footer {
  page-break-after: always;
  /* break-after: page; */
  position: fixed;
  bottom: 0;
  font-family: Arial;
  font-size: 8pt;
}
body {
    font-family: Arial;
    font-size: 10pt;
}
    </style>
  </head>
  <body>
    {% set c = contract %}
    {% if header %} <header><h1> {{ header }} </h1></header> {% endif %}
    <main> </main>
    <footer style="width: 100%;">
        <table border="0px" style="border: none; font-size: 6pt; font-family: Arial; width: 100%" width="100%">
          <col align="left" with="33%">
          <col align="center" with="33%">
          <col align="right" with="33%">
          <tr>
            <td border="0" style="border: none; font-family: Arial; font-size: 6pt; text-align: left; width:33%;" align="left">
                <span lang="en-NZ" style="font-family: Arial; font-size: 6pt;"><small>{{ c.number }}</small></span>
            </td>
            <td border="0" style="border: none; font-family: Arial; font-size: 6pt; text-align: center; width:33%;" align="center">
              <center>
                <span lang="en-NZ"><small>Contract	Issued: <sdfield type=DATETIME sdnum="5129;3081;NNNN&quot;&quot;D MMMM YYYY">{{ (c.updated_at or c.created_at or c.start_date).strftime("%d %B %Y") }}</sdfield></small></span>
              </center>
            </td>
            <td border="0" style="border: none; font-family: Arial; font-size: 6pt; text-align: right; width:33%;" align="right">
                <small>Page <b><sdfield type=PAGE subtype=RANDOM format=PAGE>{{ page_no or 1 }}</sdfield></b> of <b><sdfield type=DOCSTAT subtype=PAGE format=PAGE>{{ page_count or 5 }}</sdfield></b></small>
            </td>
          </tr>
        </table>

    </footer>

<!-- div class="pb"></div -->

  </body>
</html>
