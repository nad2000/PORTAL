{% extends "admin/base_site.html" %}

{% block content %}

  <form action="" method="post">

    {% csrf_token %}
    <input type="hidden" name="action" value="request_resubmission">
    <input type="hidden" name="select_across" value="0">
    <input type="hidden" name="index" value="0">
    {% for o in objects %}
      <input type="hidden" name="_selected_action" value="{{ o.id }}">
    {% endfor %}

    <input type="hidden" name="do_action" value="yes">

    <label for="id-resolution">Resolution:</label>
    <textarea id="id-resolution" type="textarea" name="resolution"></textarea>
    <div>
      <input type="submit" class="default" style="float: none" value="Send Request to Resubmit">
    </div>

  </form>

{% endblock content %}
{# vim:set ft=htmldjango: #}
