<div class="mb-0" style="border-bottom-width:1px;border-bottom-style:solid;">
  <header class="header" >
    {% if logo_1 and logo_2 %}
<table style="width:100%; padding:0; border-spacing:0;">
	<col style="width:50%;">
	<col style="width:50%;">
	<tr style="vertical-align: top; border:0;">
		<td style="width:50%;">
      <img style="border:0; height:70px; max-height: 70px; display: inline-block; margin-top: 5px; margin-bottom: 10px; vertical-align: top; width: auto; float: left;" src="{{ logo_1|safe }}" alt="{{ site.name }}" border="0">
		</td>
		<td style="width:50%;">
      <img style="border:0; height:70px; max-height: 70px; display: inline-block; margin-top: 5px; margin-bottom: 10px; vertical-align: top; width: auto; float: right;" src="{{ logo_2|safe }}" alt="{{ site.name }}" border="0">
		</td>
	</tr>
</table>
      {% comment %}
<table width="100%" cellpadding="0" cellspacing="0">
	<col width="128*"/>
	<col width="128*"/>
	<tr valign="top" border="0">
		<td width="50%">
      <img style="max-height: 70px; display: inline-block; margin-top: 5px; margin-bottom: 10px; vertical-align: top; width: auto" src="{{ logo_1|safe }}" alt="{{ site.name }}" align="left" height="70" border="0">

		</td>
		<td width="50%">
        <img style="max-height: 70px; display: inline-block; margin-top: 5px; margin-bottom: 10px; vertical-align: top; width: auto" src="{{ logo_2|safe }}" alt="{{ site.name }}" align="right" height="70" border="0">
		</td>
	</tr>
</table>
      {% endcomment %}
    {% else %}
      <picture>
        <img id="logo"
          {% if logo %}
            src="{{ logo|safe }}"
            alt="{{ site.name }}"
          {% else %}
            width="190px" height="50px"
            src="https://www.pmscienceprizes.org.nz/wp-content/uploads/2019/03/PM-SCIENCE-LOGO_HORIZONTAL_FINAL_7466-1-1.png"
            alt="The Prime Minister's Science Prizes"
            srcset="https://www.pmscienceprizes.org.nz/wp-content/uploads/2019/03/PM-SCIENCE-LOGO_HORIZONTAL_FINAL_7466-1-1@1x.png  1x"
          {% endif %}
        >
      </picture>
    {% endif %}
  </header>
</div>
{# vim:set ft=htmldjango: #}
