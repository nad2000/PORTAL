{% extends "admin/change_form_object_tools.html" %}
{% load i18n admin_urls %}
{% block object-tools-items %}
    {% if original and original.can_export_to_pdf %}
        <li>
          <a
             href="{% url 'application-export' original.pk %}"
             target="_blank"
             title="Export the application into a consolidated PDF file"
          >
            Export
          </a>
        </li>
    {% endif %}
    {{ block.super }}
{% endblock %}
