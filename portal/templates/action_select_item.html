{% extends "admin/base_site.html" %}

{% block content %}

  <form action="" method="post">

    {% csrf_token %}
    <input type="hidden" name="action" value="{{ action_name|default:'copy_round' }}">
    <input type="hidden" name="select_across" value="0">
    <input type="hidden" name="index" value="0">
    {% for o in objects %}
      <input type="hidden" name="_selected_action" value="{{ o.pk }}">
    {% endfor %}

    <input type="hidden" name="do_action" value="yes">

    <label for="id_chosen_object">{{ item_label|default:'Choose the target or source item' }}</label>
    <select id="id_chosen_object" name="chosen_object">

      {% if objects_with_labels %}
        {% for o in objects_with_labels %}
          <option value="{{ o.0.pk }}"{% if first_item and o.0.pk == first_item or forloop.first %} selected{% endif %}>
              {{ o.1 }}
          </option>
        {% endfor %}
      {% else %}
        {% for o in objects %}
          <option value="{{ o.pk }}"{% if first_item and o.pk == first_item or forloop.first %} selected{% endif %}>
              {{ objects_with_labels.o.pk }}:
              {% if o.code %} {{ o.code }}: {% endif %}{{ o }}
          </option>
        {% endfor %}
      {% endif %}

      {% comment %}
      {% for s in schemes %}
      <option value="{{ s.pk }}"{% if first_round %}{% if first_round.scheme == s %} selected{% endif %}{% else %}{% if forloop.first %} selected{% endif %}{% endif %}>{{ s.code }}: {{ s }}</option>
      {% endfor %}
      {% endcomment %}

    </select>

    <div>
      <input type="submit" class="default" style="float: none" value="{{ action_lable|default:'Copy' }}">
    </div>

  </form>
{% endblock %}
